<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chat-X</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f1f1f5;height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
#sidebar{width:300px;background:#111118;border-right:1px solid #2a2a3a;display:flex;flex-direction:column;height:100vh;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;height:100vh}
.avatar{border-radius:50%;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.dot{position:absolute;bottom:1px;right:1px;border-radius:50%;border:2px solid #0a0a0f}
.chat-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;border-radius:12px;margin:2px 8px;border:1px solid transparent;transition:all .15s}
.chat-item:hover{background:rgba(255,255,255,0.04)}
.chat-item.active{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.3)}
.msg-bubble{max-width:65%;padding:10px 14px;line-height:1.55;font-size:14px;word-break:break-word}
.msg-mine{background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:18px 18px 4px 18px;color:#fff;align-self:flex-end}
.msg-theirs{background:#1a1a24;border:1px solid #2a2a3a;border-radius:18px 18px 18px 4px;color:#f1f1f5;align-self:flex-start}
.msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:6px}
.msg-row.mine{flex-direction:row-reverse}
input,textarea{outline:none;font-family:'Inter',sans-serif}
button{cursor:pointer;font-family:'Inter',sans-serif}
.tab{flex:1;padding:7px 4px;border:none;border-radius:8px;font-size:11px;font-weight:600;transition:all .15s;background:transparent;color:#8b8b9e}
.tab.active{background:rgba(124,58,237,0.2);color:#8b5cf6}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);align-items:center;justify-content:center;z-index:999}
#modal.show{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn 0.2s ease}
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div style="padding:18px 16px 12px;border-bottom:1px solid #2a2a3a">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10">
        <div class="avatar" style="width:34px;height:34px;font-size:12px">CX</div>
        <div>
          <div style="font-weight:800;font-size:16px;letter-spacing:-0.3px">Chat-X</div>
          <div style="font-size:10px;color:#7c3aed">🔐 Encrypted</div>
        </div>
      </div>
      <div style="display:flex;gap:4px">
        <button onclick="" style="background:none;border:none;color:#8b8b9e;padding:6px;border-radius:8px;font-size:16px">🔔</button>
        <button onclick="" style="background:none;border:none;color:#8b8b9e;padding:6px;border-radius:8px;font-size:16px">⚙️</button>
        <button onclick="" style="background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;color:#fff;padding:6px 8px;border-radius:8px;font-size:16px">✚</button>
      </div>
    </div>
    <input id="search" oninput="filterChats()" placeholder="🔍  Search conversations..." style="width:100%;padding:9px 12px;background:#1a1a24;border:1px solid #2a2a3a;border-radius:10px;color:#f1f1f5;font-size:13px"/>
  </div>
  <div style="display:flex;padding:8px 12px;gap:4px">
    <button class="tab active" onclick="switchTab(this,'chats')">💬 Chats</button>
    <button class="tab" onclick="switchTab(this,'groups')">👥 Groups</button>
    <button class="tab" onclick="switchTab(this,'calls')">📞 Calls</button>
  </div>
  <div id="chat-list" style="flex:1;overflow-y:auto;padding-bottom:8px"></div>
  <div style="padding:12px 16px;border-top:1px solid #2a2a3a;display:flex;align-items:center;gap:10px">
    <div style="position:relative;flex-shrink:0">
      <div class="avatar" style="width:34px;height:34px;font-size:12px">GS</div>
      <div class="dot" style="width:10px;height:10px;background:#10b981"></div>
    </div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:600">Gideon Saviour</div>
      <div style="font-size:11px;color:#10b981">● Online</div>
    </div>
    <button style="background:none;border:none;color:#8b8b9e;font-size:18px">⋯</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="empty" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px">
    <div style="width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 0 40px rgba(124,58,237,0.4);font-size:36px">💬</div>
    <h2 style="font-size:24px;font-weight:700;margin-bottom:8px">Welcome to Chat-X</h2>
    <p style="color:#8b8b9e;font-size:15px;margin-bottom:32px;text-align:center;max-width:300px">Select a conversation to start messaging</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <div style="background:#1a1a24;border:1px solid #2a2a3a;border-radius:10px;padding:8px 14px;font-size:13px;color:#8b8b9e">🔐 End-to-end encrypted</div>
      <div style="background:#1a1a24;border:1px solid #2a2a3a;border-radius:10px;padding:8px 14px;font-size:13px;color:#8b8b9e">⚡ Real-time messaging</div>
      <div style="background:#1a1a24;border:1px solid #2a2a3a;border-radius:10px;padding:8px 14px;font-size:13px;color:#8b8b9e">🛡️ Privacy first</div>
    </div>
  </div>
  <div id="chat-area" style="display:none;flex-direction:column;height:100vh">
    <div id="chat-header" style="padding:14px 20px;border-bottom:1px solid #2a2a3a;display:flex;align-items:center;justify-content:space-between;background:#111118"></div>
    <div style="text-align:center;padding:6px;font-size:11px;color:#4a4a5e">🔒 End-to-end encrypted · No one outside this chat can read these messages</div>
    <div id="messages" style="flex:1;overflow-y:auto;padding:8px 20px;display:flex;flex-direction:column;gap:4px"></div>
    <div style="padding:12px 16px;border-top:1px solid #2a2a3a;background:#111118;display:flex;align-items:flex-end;gap:8px">
      <div style="display:flex;gap:2px">
        <button style="background:none;border:none;color:#8b8b9e;padding:8px;border-radius:8px;font-size:18px">📎</button>
        <button style="background:none;border:none;color:#8b8b9e;padding:8px;border-radius:8px;font-size:18px">🖼️</button>
      </div>
      <textarea id="msg-input" rows="1" placeholder="Message..." oninput="autoResize(this)" onkeydown="handleKey(event)"
        style="flex:1;background:#1a1a24;border:1px solid #2a2a3a;border-radius:12px;padding:10px 14px;color:#f1f1f5;font-size:14px;resize:none;max-height:100px;overflow-y:auto;line-height:1.5"></textarea>
      <div style="display:flex;gap:4px">
        <button style="background:none;border:none;color:#8b8b9e;padding:8px;border-radius:8px;font-size:18px">😊</button>
        <button id="send-btn" onclick="sendMessage()"
          style="background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;color:#fff;width:38px;height:38px;border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center">🎤</button>
      </div>
    </div>
  </div>
</div>

<!-- Call Modal -->
<div id="modal">
  <div style="background:#1a1a24;border:1px solid #2a2a3a;border-radius:24px;padding:48px;text-align:center;width:300px">
    <div id="modal-avatar" class="avatar" style="width:80px;height:80px;font-size:28px;margin:0 auto"></div>
    <div id="modal-name" style="margin-top:20px;font-size:20px;font-weight:700"></div>
    <div id="modal-type" style="color:#8b8b9e;margin-top:6px;font-size:14px"></div>
    <div style="display:flex;gap:20px;justify-content:center;margin-top:36px">
      <button onclick="closeCall()" style="background:#ef4444;border:none;color:#fff;width:60px;height:60px;border-radius:50%;font-size:22px">✕</button>
      <button id="modal-accept" style="background:#10b981;border:none;color:#fff;width:60px;height:60px;border-radius:50%;font-size:22px">📞</button>
    </div>
  </div>
</div>

<script>
const contacts = [
  {id:'u2',name:'David Lawrence',av:'DL',status:'online',seen:'now',unread:3,last:'Can we jump on a call?',type:'dm'},
  {id:'u3',name:'Sarah Chen',av:'SC',status:'online',seen:'now',unread:0,last:'The designs look amazing 🔥',type:'dm'},
  {id:'u4',name:'Marcus Webb',av:'MW',status:'away',seen:'5m ago',unread:1,last:'Check the repo when you can',type:'dm'},
  {id:'u5',name:'Priya Sharma',av:'PS',status:'offline',seen:'2h ago',unread:0,last:'See you tomorrow!',type:'dm'},
  {id:'u6',name:'James Okafor',av:'JO',status:'online',seen:'now',unread:0,last:'Sent you the files',type:'dm'},
  {id:'u7',name:'Luna Park',av:'LP',status:'offline',seen:'1d ago',unread:0,last:'Great working with you',type:'dm'},
  {id:'g1',name:'Finite Brand Team',av:'FB',status:'group',seen:'now',unread:5,last:'Sarah: Pushing new designs now',type:'group',members:6},
  {id:'g2',name:'Chat-X Dev',av:'CX',status:'group',seen:'10m ago',unread:0,last:'Marcus: All tests passing ✅',type:'group',members:4},
  {id:'g3',name:'Bitcoin Builders',av:'BB',status:'group',seen:'30m ago',unread:2,last:'James: Block 850,000 mined!',type:'group',members:12},
]

const seedMsgs = (c) => [
  {from:c.id,text:'Hey! How is everything going?',time:'10:00 AM',status:'read'},
  {from:'me',text:"All good! Just finishing up Chat-X. It's looking really clean.",time:'10:02 AM',status:'read'},
  {from:c.id,text:"That's awesome. What features are you adding?",time:'10:03 AM',status:'read'},
  {from:'me',text:'Real-time messaging, group chats, voice/video calls, media sharing, end-to-end encryption and online status!',time:'10:05 AM',status:'read'},
  {from:c.id,text:"End-to-end encryption? That's next level 🔐",time:'10:06 AM',status:'read'},
  {from:'me',text:'Yeah, privacy first. Every message encrypted before it leaves your device.',time:'10:08 AM',status:'read'},
  {from:c.id,text:c.last,time:'10:10 AM',status:'delivered'},
]

const statusColor = s => s==='online'?'#10b981':s==='away'?'#f59e0b':'#4a4a5e'
let currentTab = 'chats'
let activeContact = null
let messages = []

function avatar(initials, size, status) {
  const dot = status && status !== 'group'
    ? `<div class="dot" style="width:${Math.round(size*0.28)}px;height:${Math.round(size*0.28)}px;background:${statusColor(status)}"></div>` : ''
  return `<div style="position:relative;width:${size}px;height:${size}px;flex-shrink:0">
    <div class="avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.34)}px">${initials}</div>${dot}</div>`
}

function renderList() {
  const search = document.getElementById('search').value.toLowerCase()
  const list = document.getElementById('chat-list')
  const filtered = contacts.filter(c => {
    const matchTab = currentTab==='chats'?c.type==='dm':currentTab==='groups'?c.type==='group':true
    return matchTab && c.name.toLowerCase().includes(search)
  })
  list.innerHTML = filtered.map(c => `
    <div class="chat-item${activeContact?.id===c.id?' active':''}" onclick="openChat('${c.id}')">
      ${avatar(c.av,44,c.status)}
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:600;font-size:14px">${c.name}</span>
          <span style="font-size:11px;color:#4a4a5e">${c.seen}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">
          <span style="font-size:12px;color:#8b8b9e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px">${c.last}</span>
          ${c.unread>0?`<span style="background:#7c3aed;color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:1px 7px">${c.unread}</span>`:''}
        </div>
      </div>
    </div>`).join('')
}

function openChat(id) {
  activeContact = contacts.find(c=>c.id===id)
  messages = seedMsgs(activeContact)
  document.getElementById('empty').style.display = 'none'
  const area = document.getElementById('chat-area')
  area.style.display = 'flex'

  // Header
  document.getElementById('chat-header').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px">
      ${avatar(activeContact.av,42,activeContact.status)}
      <div>
        <div style="font-weight:700;font-size:15px">${activeContact.name}</div>
        <div style="font-size:12px;color:${activeContact.status==='online'?'#10b981':'#8b8b9e'}">
          ${activeContact.members?activeContact.members+' members':activeContact.status==='online'?'● Online':'Last seen '+activeContact.seen}
        </div>
      </div>
    </div>
    <div style="display:flex;gap:4px">
      <button onclick="openCall('voice')" style="background:none;border:none;color:#8b8b9e;padding:8px 10px;border-radius:8px;font-size:18px">📞</button>
      <button onclick="openCall('video')" style="background:none;border:none;color:#8b8b9e;padding:8px 10px;border-radius:8px;font-size:18px">📹</button>
      <button style="background:none;border:none;color:#8b8b9e;padding:8px 10px;border-radius:8px;font-size:18px">⋯</button>
    </div>`

  renderMessages()
  renderList()
}

function renderMessages() {
  const box = document.getElementById('messages')
  box.innerHTML = messages.map(m => {
    const mine = m.from==='me'
    const tick = m.status==='read'?'<span style="color:#a78bfa;font-size:12px">✓✓</span>':
                 m.status==='delivered'?'<span style="color:#4a4a5e;font-size:12px">✓✓</span>':
                 '<span style="color:#4a4a5e;font-size:12px">✓</span>'
    return `<div class="msg-row${mine?' mine':''} fade">
      ${!mine?avatar(activeContact.av,28,null):''}
      <div class="msg-bubble ${mine?'msg-mine':'msg-theirs'}">
        ${m.text}
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:3px">
          <span style="font-size:11px;color:${mine?'rgba(255,255,255,0.55)':'#4a4a5e'}">${m.time}</span>
          ${mine?tick:''}
        </div>
      </div>
    </div>`
  }).join('')
  box.scrollTop = box.scrollHeight
}

function sendMessage() {
  const input = document.getElementById('msg-input')
  const text = input.value.trim()
  if(!text) return
  const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})
  messages.push({from:'me',text,time,status:'sent'})
  input.value = ''
  input.style.height = 'auto'
  document.getElementById('send-btn').innerHTML = '🎤'
  renderMessages()
  setTimeout(()=>{
    messages[messages.length-1].status = 'delivered'
    messages.push({from:activeContact.id,text:'Got it! 👍',time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),status:'delivered'})
    renderMessages()
  },1500)
}

function handleKey(e) {
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
}

function autoResize(el) {
  el.style.height='auto'
  el.style.height=Math.min(el.scrollHeight,100)+'px'
  document.getElementById('send-btn').innerHTML = el.value.trim()?'➤':'🎤'
}

function switchTab(btn, tab) {
  currentTab = tab
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
  renderList()
}

function filterChats() { renderList() }

function openCall(type) {
  document.getElementById('modal-avatar').textContent = activeContact.av
  document.getElementById('modal-name').textContent = activeContact.name
  document.getElementById('modal-type').textContent = type==='video'?'📹 Video calling...':'📞 Calling...'
  document.getElementById('modal-accept').textContent = type==='video'?'📹':'📞'
  document.getElementById('modal').classList.add('show')
}

function closeCall() {
  document.getElementById('modal').classList.remove('show')
}

// Init
renderList()
</script>
</body>
</html>
