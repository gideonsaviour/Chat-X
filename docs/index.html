<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat-X — Next Generation Messaging</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f1f1f5;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
::-webkit-scrollbar-track{background:transparent}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.2s ease}
textarea{font-family:'Inter',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const COLORS = {
  bg1:'#0a0a0f', bg2:'#111118', bg3:'#1a1a24',
  accent:'#7c3aed', accentLight:'#8b5cf6',
  text:'#f1f1f5', textSub:'#8b8b9e', textMuted:'#4a4a5e',
  border:'#2a2a3a', success:'#10b981', danger:'#ef4444', warning:'#f59e0b'
}

const currentUser = { id:'u1', name:'Gideon Saviour', avatar:'GS' }

const contacts = [
  {id:'u2',name:'David Lawrence',avatar:'DL',status:'online',lastSeen:'now',unread:3,lastMessage:'Can we jump on a call?'},
  {id:'u3',name:'Sarah Chen',avatar:'SC',status:'online',lastSeen:'now',unread:0,lastMessage:'The designs look amazing 🔥'},
  {id:'u4',name:'Marcus Webb',avatar:'MW',status:'away',lastSeen:'5m ago',unread:1,lastMessage:'Check the repo when you can'},
  {id:'u5',name:'Priya Sharma',avatar:'PS',status:'offline',lastSeen:'2h ago',unread:0,lastMessage:'See you tomorrow!'},
  {id:'u6',name:'James Okafor',avatar:'JO',status:'online',lastSeen:'now',unread:0,lastMessage:'Sent you the files'},
  {id:'u7',name:'Luna Park',avatar:'LP',status:'offline',lastSeen:'1d ago',unread:0,lastMessage:'Great working with you'},
]

const groups = [
  {id:'g1',name:'Finite Brand Team',avatar:'FB',members:6,status:'group',unread:5,lastMessage:'Sarah: Pushing new designs now',lastSeen:'now'},
  {id:'g2',name:'Chat-X Dev',avatar:'CX',members:4,status:'group',unread:0,lastMessage:'Marcus: All tests passing ✅',lastSeen:'10m ago'},
  {id:'g3',name:'Bitcoin Builders',avatar:'BB',members:12,status:'group',unread:2,lastMessage:'James: Block 850,000 mined!',lastSeen:'30m ago'},
]

const seedMessages = (contactId) => [
  {id:1,from:contactId,text:'Hey! How is everything going?',time:'10:00 AM',status:'read'},
  {id:2,from:'u1',text:'All good! Just finishing up the Chat-X build. It\'s looking really clean.',time:'10:02 AM',status:'read'},
  {id:3,from:contactId,text:'That\'s awesome. What features are you adding?',time:'10:03 AM',status:'read'},
  {id:4,from:'u1',text:'Real-time messaging, group chats, voice/video calls, media sharing, end-to-end encryption and online status!',time:'10:05 AM',status:'read'},
  {id:5,from:contactId,text:'End-to-end encryption? That\'s next level 🔐',time:'10:06 AM',status:'read'},
  {id:6,from:'u1',text:'Yeah, privacy first. Every message encrypted before it leaves your device.',time:'10:08 AM',status:'read'},
  {id:7,from:contactId,text:contacts.find(c=>c.id===contactId)?.lastMessage || 'Hey!',time:'10:10 AM',status:'delivered'},
]

const statusColor = s => s==='online'?COLORS.success:s==='away'?COLORS.warning:COLORS.textMuted

const Avatar = ({initials,size=40,status}) => (
  <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
    <div style={{
      width:size,height:size,borderRadius:'50%',
      background:'linear-gradient(135deg,#7c3aed,#4f46e5)',
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:size*0.34,fontWeight:700,color:'#fff',letterSpacing:'-0.5px'
    }}>{initials}</div>
    {status&&status!=='group'&&(
      <div style={{
        position:'absolute',bottom:1,right:1,
        width:size*0.28,height:size*0.28,borderRadius:'50%',
        background:statusColor(status),border:`2px solid ${COLORS.bg1}`
      }}/>
    )}
  </div>
)

const Tick = ({status}) => {
  if(status==='read') return <span style={{color:'#a78bfa',fontSize:13}}>✓✓</span>
  if(status==='delivered') return <span style={{color:'#4a4a5e',fontSize:13}}>✓✓</span>
  return <span style={{color:'#4a4a5e',fontSize:13}}>✓</span>
}

function CallModal({type,contact,onClose}){
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.88)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:999}}>
      <div style={{background:COLORS.bg3,border:`1px solid ${COLORS.border}`,borderRadius:24,padding:48,textAlign:'center',width:300}}>
        <Avatar initials={contact.avatar} size={80}/>
        <div style={{marginTop:20,fontSize:20,fontWeight:700}}>{contact.name}</div>
        <div style={{color:COLORS.textSub,marginTop:6,fontSize:14}}>{type==='video'?'📹 Video calling...':'📞 Calling...'}</div>
        <div style={{display:'flex',gap:20,justifyContent:'center',marginTop:36}}>
          <button onClick={onClose} style={{background:COLORS.danger,border:'none',color:'#fff',width:60,height:60,borderRadius:'50%',cursor:'pointer',fontSize:20}}>✕</button>
          <button style={{background:COLORS.success,border:'none',color:'#fff',width:60,height:60,borderRadius:'50%',cursor:'pointer',fontSize:20}}>{type==='video'?'📹':'📞'}</button>
        </div>
      </div>
    </div>
  )
}

function ChatWindow({contact}){
  const [messages,setMessages] = useState(seedMessages(contact.id))
  const [input,setInput] = useState('')
  const [call,setCall] = useState(null)
  const [recording,setRecording] = useState(false)
  const bottom = useRef(null)

  useEffect(()=>{setMessages(seedMessages(contact.id))},[contact.id])
  useEffect(()=>{bottom.current?.scrollIntoView({behavior:'smooth'})},[messages])

  const send = () => {
    if(!input.trim()) return
    const msg = {id:Date.now(),from:'u1',text:input,time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),status:'sent'}
    setMessages(p=>[...p,msg])
    setInput('')
    setTimeout(()=>{
      setMessages(p=>[...p,{id:Date.now()+1,from:contact.id,text:'Got it! 👍',time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),status:'delivered'}])
    },1500)
  }

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',height:'100vh',background:COLORS.bg1}}>
      {call&&<CallModal type={call} contact={contact} onClose={()=>setCall(null)}/>}

      {/* Header */}
      <div style={{padding:'14px 20px',borderBottom:`1px solid ${COLORS.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',background:COLORS.bg2}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <Avatar initials={contact.avatar} size={42} status={contact.status}/>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{contact.name}</div>
            <div style={{fontSize:12,color:contact.status==='online'?COLORS.success:COLORS.textSub}}>
              {contact.members?`${contact.members} members`:contact.status==='online'?'● Online':`Last seen ${contact.lastSeen}`}
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:4}}>
          {[['📞','Voice call',()=>setCall('voice')],['📹','Video call',()=>setCall('video')],['⋯','More',()=>{}]].map(([icon,tip,fn])=>(
            <button key={tip} onClick={fn} title={tip} style={{background:'none',border:'none',color:COLORS.textSub,cursor:'pointer',padding:'8px 10px',borderRadius:8,fontSize:18}}>{icon}</button>
          ))}
        </div>
      </div>

      {/* Encryption badge */}
      <div style={{textAlign:'center',padding:'6px 16px',fontSize:11,color:COLORS.textMuted}}>
        🔒 End-to-end encrypted · No one outside this chat can read these messages
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'8px 20px',display:'flex',flexDirection:'column',gap:4}}>
        {messages.map(msg=>{
          const mine = msg.from==='u1'
          return (
            <div key={msg.id} className="fade-in" style={{display:'flex',justifyContent:mine?'flex-end':'flex-start',alignItems:'flex-end',gap:8}}>
              {!mine&&<Avatar initials={contact.avatar} size={28}/>}
              <div style={{
                maxWidth:'65%',
                background:mine?'linear-gradient(135deg,#7c3aed,#4f46e5)':COLORS.bg3,
                border:mine?'none':`1px solid ${COLORS.border}`,
                borderRadius:mine?'18px 18px 4px 18px':'18px 18px 18px 4px',
                padding:'10px 14px',
              }}>
                <div style={{fontSize:14,lineHeight:1.55,color:mine?'#fff':COLORS.text}}>{msg.text}</div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:4,marginTop:3}}>
                  <span style={{fontSize:11,color:mine?'rgba(255,255,255,0.55)':COLORS.textMuted}}>{msg.time}</span>
                  {mine&&<Tick status={msg.status}/>}
                </div>
              </div>
            </div>
          )
        })}
        <div ref={bottom}/>
      </div>

      {/* Input */}
      <div style={{padding:'12px 16px',borderTop:`1px solid ${COLORS.border}`,background:COLORS.bg2,display:'flex',alignItems:'flex-end',gap:8}}>
        <div style={{display:'flex',gap:2}}>
          <button title="Attach" style={{background:'none',border:'none',color:COLORS.textSub,cursor:'pointer',padding:8,borderRadius:8,fontSize:18}}>📎</button>
          <button title="Image" style={{background:'none',border:'none',color:COLORS.textSub,cursor:'pointer',padding:8,borderRadius:8,fontSize:18}}>🖼️</button>
        </div>
        <textarea
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}}
          placeholder="Message..."
          rows={1}
          style={{
            flex:1,background:COLORS.bg3,border:`1px solid ${COLORS.border}`,
            borderRadius:12,padding:'10px 14px',color:COLORS.text,fontSize:14,
            outline:'none',resize:'none',lineHeight:1.5,maxHeight:100,overflowY:'auto'
          }}
        />
        <div style={{display:'flex',gap:4}}>
          <button style={{background:'none',border:'none',color:COLORS.textSub,cursor:'pointer',padding:8,borderRadius:8,fontSize:18}}>😊</button>
          {input.trim()?(
            <button onClick={send} style={{
              background:'linear-gradient(135deg,#7c3aed,#4f46e5)',border:'none',color:'#fff',
              cursor:'pointer',width:38,height:38,borderRadius:10,fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'
            }}>➤</button>
          ):(
            <button
              onMouseDown={()=>setRecording(true)}
              onMouseUp={()=>setRecording(false)}
              style={{
                background:recording?`linear-gradient(135deg,${COLORS.danger},#dc2626)`:'linear-gradient(135deg,#7c3aed,#4f46e5)',
                border:'none',color:'#fff',cursor:'pointer',width:38,height:38,borderRadius:10,fontSize:18,
                display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'
              }}>🎤</button>
          )}
        </div>
      </div>
    </div>
  )
}

function EmptyState(){
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:COLORS.bg1,padding:40}}>
      <div style={{
        width:80,height:80,borderRadius:24,
        background:'linear-gradient(135deg,#7c3aed,#4f46e5)',
        display:'flex',alignItems:'center',justifyContent:'center',marginBottom:24,
        boxShadow:'0 0 40px rgba(124,58,237,0.4)',fontSize:36
      }}>💬</div>
      <h2 style={{fontSize:24,fontWeight:700,marginBottom:8}}>Welcome to Chat-X</h2>
      <p style={{color:COLORS.textSub,fontSize:15,marginBottom:32,textAlign:'center',maxWidth:300}}>
        Select a conversation to start messaging
      </p>
      <div style={{display:'flex',gap:12,flexWrap:'wrap',justifyContent:'center'}}>
        {['🔐 End-to-end encrypted','⚡ Real-time messaging','🛡️ Privacy first'].map(f=>(
          <div key={f} style={{background:COLORS.bg3,border:`1px solid ${COLORS.border}`,borderRadius:10,padding:'8px 14px',fontSize:13,color:COLORS.textSub}}>{f}</div>
        ))}
      </div>
    </div>
  )
}

function Sidebar({active,setActive}){
  const [tab,setTab] = useState('chats')
  const [search,setSearch] = useState('')

  const all = tab==='groups'?groups:tab==='chats'?contacts:[...contacts,...groups]
  const filtered = all.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()))

  return (
    <div style={{width:300,background:COLORS.bg2,borderRight:`1px solid ${COLORS.border}`,display:'flex',flexDirection:'column',height:'100vh',flexShrink:0}}>
      {/* Header */}
      <div style={{padding:'18px 16px 12px',borderBottom:`1px solid ${COLORS.border}`}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <Avatar initials="CX" size={34}/>
            <div>
              <div style={{fontWeight:800,fontSize:16,letterSpacing:'-0.3px'}}>Chat-X</div>
              <div style={{fontSize:10,color:COLORS.accent}}>🔐 Encrypted</div>
            </div>
          </div>
          <div style={{display:'flex',gap:4}}>
            <button style={{background:'none',border:'none',color:COLORS.textSub,cursor:'pointer',padding:6,borderRadius:8,fontSize:16}}>🔔</button>
            <button style={{background:'none',border:'none',color:COLORS.textSub,cursor:'pointer',padding:6,borderRadius:8,fontSize:16}}>⚙️</button>
            <button style={{background:'linear-gradient(135deg,#7c3aed,#4f46e5)',border:'none',color:'#fff',cursor:'pointer',padding:'6px 8px',borderRadius:8,fontSize:16}}>✚</button>
          </div>
        </div>
        <input
          value={search}
          onChange={e=>setSearch(e.target.value)}
          placeholder="🔍  Search conversations..."
          style={{
            width:'100%',padding:'9px 12px',background:COLORS.bg3,
            border:`1px solid ${COLORS.border}`,borderRadius:10,
            color:COLORS.text,fontSize:13,outline:'none'
          }}
        />
      </div>

      {/* Tabs */}
      <div style={{display:'flex',padding:'8px 12px',gap:4}}>
        {[['chats','💬 Chats'],['groups','👥 Groups'],['calls','📞 Calls']].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            flex:1,padding:'7px 4px',border:'none',borderRadius:8,cursor:'pointer',
            background:tab===id?'rgba(124,58,237,0.2)':'transparent',
            color:tab===id?COLORS.accentLight:COLORS.textSub,
            fontSize:11,fontWeight:600,transition:'all 0.15s'
          }}>{label}</button>
        ))}
      </div>

      {/* List */}
      <div style={{flex:1,overflowY:'auto',paddingBottom:8}}>
        {filtered.map(chat=>(
          <div key={chat.id} onClick={()=>setActive(chat)} style={{
            display:'flex',alignItems:'center',gap:12,padding:'10px 14px',
            cursor:'pointer',borderRadius:12,margin:'2px 8px',
            background:active?.id===chat.id?'rgba(124,58,237,0.15)':'transparent',
            border:active?.id===chat.id?`1px solid rgba(124,58,237,0.3)`:'1px solid transparent',
            transition:'all 0.15s'
          }}>
            <Avatar initials={chat.avatar} size={44} status={chat.status}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:600,fontSize:14}}>{chat.name}</span>
                <span style={{fontSize:11,color:COLORS.textMuted}}>{chat.lastSeen}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:2}}>
                <span style={{fontSize:12,color:COLORS.textSub,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:150}}>{chat.lastMessage}</span>
                {chat.unread>0&&<span style={{background:COLORS.accent,color:'#fff',fontSize:11,fontWeight:700,borderRadius:10,padding:'1px 7px'}}>{chat.unread}</span>}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Profile */}
      <div style={{padding:'12px 16px',borderTop:`1px solid ${COLORS.border}`,display:'flex',alignItems:'center',gap:10}}>
        <Avatar initials={currentUser.avatar} size={34} status="online"/>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:600}}>{currentUser.name}</div>
          <div style={{fontSize:11,color:COLORS.success}}>● Online</div>
        </div>
        <button style={{background:'none',border:'none',color:COLORS.textSub,cursor:'pointer',fontSize:16}}>⋯</button>
      </div>
    </div>
  )
}

function App(){
  const [active,setActive] = useState(null)
  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar active={active} setActive={setActive}/>
      {active?<ChatWindow contact={active}/>:<EmptyState/>}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
