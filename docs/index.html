<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chat-X</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f1f1f5;height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
#sidebar{width:300px;background:#111118;border-right:1px solid #2a2a3a;display:flex;flex-direction:column;height:100vh;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0}
.avatar{border-radius:50%;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.status-dot{position:absolute;bottom:1px;right:1px;border-radius:50%;border:2px solid #111118}
.chat-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;border-radius:12px;margin:2px 8px;border:1px solid transparent;transition:background .15s}
.chat-item:hover{background:rgba(255,255,255,0.05)}
.chat-item.active{background:rgba(124,58,237,0.15);border-color:rgba(124,58,237,0.3)}
.tab-btn{flex:1;padding:7px 4px;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;background:transparent;color:#8b8b9e;font-family:'Inter',sans-serif}
.tab-btn.active{background:rgba(124,58,237,0.2);color:#8b5cf6}
.tab-btn:hover:not(.active){background:rgba(255,255,255,0.05);color:#f1f1f5}
.icon-btn{background:none;border:none;color:#8b8b9e;cursor:pointer;padding:8px;border-radius:8px;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.icon-btn:hover{background:rgba(255,255,255,0.08);color:#f1f1f5}
.icon-btn:active{transform:scale(0.92)}
.send-btn{background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;color:#fff;width:40px;height:40px;border-radius:12px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.send-btn:hover{opacity:0.85;transform:scale(1.05)}
.send-btn:active{transform:scale(0.95)}
.msg-mine{background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:18px 18px 4px 18px;color:#fff;padding:10px 14px;max-width:65%;font-size:14px;line-height:1.55;word-break:break-word}
.msg-theirs{background:#1a1a24;border:1px solid #2a2a3a;border-radius:18px 18px 18px 4px;color:#f1f1f5;padding:10px 14px;max-width:65%;font-size:14px;line-height:1.55;word-break:break-word}
.msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:6px}
.msg-row.mine{flex-direction:row-reverse}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp 0.18s ease}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px)}
#modal-overlay.show{display:flex}
#modal-box{background:#1a1a24;border:1px solid #2a2a3a;border-radius:24px;padding:40px 48px;text-align:center;width:300px}
.modal-btn{border:none;width:60px;height:60px;border-radius:50%;font-size:22px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.modal-btn:hover{transform:scale(1.08)}
.modal-btn:active{transform:scale(0.95)}
input,textarea{outline:none;font-family:'Inter',sans-serif;color:#f1f1f5}
input::placeholder,textarea::placeholder{color:#4a4a5e}
.pill{background:#1a1a24;border:1px solid #2a2a3a;border-radius:10px;padding:8px 14px;font-size:13px;color:#8b8b9e}
.unread-badge{background:#7c3aed;color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:2px 8px;min-width:22px;text-align:center}
</style>
</head>
<body>

<div id="sidebar">
  <!-- Header -->
  <div style="padding:16px 16px 12px;border-bottom:1px solid #2a2a3a">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="position:relative">
          <div class="avatar" style="width:36px;height:36px;font-size:13px;font-weight:800">CX</div>
          <div class="status-dot" style="width:10px;height:10px;background:#10b981"></div>
        </div>
        <div>
          <div style="font-weight:800;font-size:16px;letter-spacing:-0.3px">Chat-X</div>
          <div style="font-size:10px;color:#7c3aed;font-weight:600">🔐 Encrypted</div>
        </div>
      </div>
      <div style="display:flex;gap:2px">
        <button class="icon-btn" title="Notifications" onclick="alert('Notifications coming soon!')">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <button class="icon-btn" title="Settings" onclick="alert('Settings coming soon!')">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button class="icon-btn" title="New chat" onclick="alert('New chat coming soon!')" style="background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border-radius:8px">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div style="position:relative">
      <svg width="14" height="14" fill="none" stroke="#4a4a5e" stroke-width="2" viewBox="0 0 24 24" style="position:absolute;left:11px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" oninput="renderList()" placeholder="Search conversations..." style="width:100%;padding:9px 12px 9px 32px;background:#1a1a24;border:1px solid #2a2a3a;border-radius:10px;font-size:13px"/>
    </div>
  </div>

  <!-- Tabs -->
  <div style="display:flex;padding:8px 12px;gap:4px">
    <button class="tab-btn active" onclick="switchTab(this,'chats')">💬 Chats</button>
    <button class="tab-btn" onclick="switchTab(this,'groups')">👥 Groups</button>
    <button class="tab-btn" onclick="switchTab(this,'calls')">📞 Calls</button>
  </div>

  <!-- List -->
  <div id="chat-list" style="flex:1;overflow-y:auto;padding-bottom:8px"></div>

  <!-- Profile -->
  <div style="padding:12px 16px;border-top:1px solid #2a2a3a;display:flex;align-items:center;gap:10px">
    <div style="position:relative;flex-shrink:0">
      <div class="avatar" style="width:36px;height:36px;font-size:13px">GS</div>
      <div class="status-dot" style="width:10px;height:10px;background:#10b981"></div>
    </div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:600">Gideon Saviour</div>
      <div style="font-size:11px;color:#10b981">● Online</div>
    </div>
    <button class="icon-btn" onclick="alert('Profile settings coming soon!')">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <!-- Empty state -->
  <div id="empty-state" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px">
    <div style="width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 0 40px rgba(124,58,237,0.35)">
      <svg width="36" height="36" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <h2 style="font-size:24px;font-weight:700;margin-bottom:8px">Welcome to Chat-X</h2>
    <p style="color:#8b8b9e;font-size:15px;margin-bottom:32px;text-align:center;max-width:300px">Select a conversation to start messaging</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <div class="pill">🔐 End-to-end encrypted</div>
      <div class="pill">⚡ Real-time messaging</div>
      <div class="pill">🛡️ Privacy first</div>
    </div>
  </div>

  <!-- Chat area -->
  <div id="chat-area" style="display:none;flex-direction:column;height:100vh">
    <!-- Chat header -->
    <div id="chat-header" style="padding:14px 20px;border-bottom:1px solid #2a2a3a;background:#111118;display:flex;align-items:center;justify-content:space-between;flex-shrink:0"></div>
    <!-- Encryption notice -->
    <div style="text-align:center;padding:6px 16px;font-size:11px;color:#4a4a5e;flex-shrink:0">
      🔒 Messages are end-to-end encrypted. No one outside this chat can read them.
    </div>
    <!-- Messages -->
    <div id="messages" style="flex:1;overflow-y:auto;padding:8px 20px;display:flex;flex-direction:column"></div>
    <!-- Input bar -->
    <div style="padding:12px 16px;border-top:1px solid #2a2a3a;background:#111118;display:flex;align-items:flex-end;gap:8px;flex-shrink:0">
      <button class="icon-btn" title="Attach file" onclick="alert('File sharing coming soon!')">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <button class="icon-btn" title="Send image" onclick="alert('Image sharing coming soon!')">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <textarea id="msg-input" rows="1" placeholder="Type a message..." oninput="handleInput(this)" onkeydown="handleKey(event)"
        style="flex:1;background:#1a1a24;border:1px solid #2a2a3a;border-radius:12px;padding:10px 14px;font-size:14px;resize:none;max-height:100px;overflow-y:auto;line-height:1.5"></textarea>
      <button class="icon-btn" title="Emoji" onclick="alert('Emoji picker coming soon!')">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </button>
      <button id="send-btn" class="send-btn" onclick="sendMessage()" title="Send message">
        <svg id="send-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 18v-6"/><path d="M8 14l4-4 4 4"/><path d="M19 14a7 7 0 1 0-7 7"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Call Modal -->
<div id="modal-overlay" onclick="closeCall(event)">
  <div id="modal-box">
    <div id="modal-av" class="avatar" style="width:80px;height:80px;font-size:28px;margin:0 auto"></div>
    <div id="modal-name" style="margin-top:20px;font-size:20px;font-weight:700"></div>
    <div id="modal-sub" style="color:#8b8b9e;margin-top:6px;font-size:14px"></div>
    <div style="display:flex;gap:20px;justify-content:center;margin-top:36px">
      <button class="modal-btn" onclick="closeCall()" style="background:#ef4444;color:#fff" title="Decline">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="modal-btn" onclick="acceptCall()" style="background:#10b981;color:#fff" title="Accept" id="accept-btn">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const contacts = [
  {id:'u2',name:'David Lawrence',av:'DL',status:'online',seen:'now',unread:3,last:'Can we jump on a call?',type:'dm'},
  {id:'u3',name:'Sarah Chen',av:'SC',status:'online',seen:'now',unread:0,last:'The designs look amazing 🔥',type:'dm'},
  {id:'u4',name:'Marcus Webb',av:'MW',status:'away',seen:'5m ago',unread:1,last:'Check the repo when you can',type:'dm'},
  {id:'u5',name:'Priya Sharma',av:'PS',status:'offline',seen:'2h ago',unread:0,last:'See you tomorrow!',type:'dm'},
  {id:'u6',name:'James Okafor',av:'JO',status:'online',seen:'now',unread:0,last:'Sent you the files',type:'dm'},
  {id:'u7',name:'Luna Park',av:'LP',status:'offline',seen:'1d ago',unread:0,last:'Great working with you',type:'dm'},
  {id:'g1',name:'Finite Brand Team',av:'FB',status:'group',seen:'now',unread:5,last:'Sarah: Pushing new designs now',type:'group',members:6},
  {id:'g2',name:'Chat-X Dev',av:'CX',status:'group',seen:'10m ago',unread:0,last:'Marcus: All tests passing ✅',type:'group',members:4},
  {id:'g3',name:'Bitcoin Builders',av:'BB',status:'group',seen:'30m ago',unread:2,last:'James: Block 850,000 mined!',type:'group',members:12},
]

const statusColor = s => s==='online'?'#10b981':s==='away'?'#f59e0b':'#3a3a4e'
let currentTab = 'chats', activeContact = null, messages = []

function mkAvatar(initials, size, status) {
  const fs = Math.round(size * 0.34)
  const ds = Math.round(size * 0.28)
  const dot = status && status !== 'group'
    ? `<div class="status-dot" style="width:${ds}px;height:${ds}px;background:${statusColor(status)}"></div>` : ''
  return `<div style="position:relative;width:${size}px;height:${size}px;flex-shrink:0">
    <div class="avatar" style="width:${size}px;height:${size}px;font-size:${fs}px">${initials}</div>${dot}</div>`
}

function seedMsgs(c) {
  return [
    {from:c.id,text:'Hey! How is everything going?',time:'10:00 AM',status:'read'},
    {from:'me',text:"All good! Just finishing up Chat-X. It's looking really clean.",time:'10:02 AM',status:'read'},
    {from:c.id,text:"That's awesome. What features are you adding?",time:'10:03 AM',status:'read'},
    {from:'me',text:'Real-time messaging, group chats, voice/video calls, media sharing, end-to-end encryption and online status!',time:'10:05 AM',status:'read'},
    {from:c.id,text:"End-to-end encryption? That's next level 🔐",time:'10:06 AM',status:'read'},
    {from:'me',text:'Yeah, privacy first. Every message is encrypted before it leaves your device.',time:'10:08 AM',status:'read'},
    {from:c.id,text:c.last,time:'10:10 AM',status:'delivered'},
  ]
}

function tick(status) {
  if(status==='read') return '<span style="color:#a78bfa;font-size:12px;margin-left:2px">✓✓</span>'
  if(status==='delivered') return '<span style="color:#6b6b80;font-size:12px;margin-left:2px">✓✓</span>'
  return '<span style="color:#6b6b80;font-size:12px;margin-left:2px">✓</span>'
}

function renderList() {
  const search = document.getElementById('search').value.toLowerCase()
  const list = document.getElementById('chat-list')
  const filtered = contacts.filter(c => {
    const tabMatch = currentTab==='chats'?c.type==='dm':currentTab==='groups'?c.type==='group':true
    return tabMatch && c.name.toLowerCase().includes(search)
  })
  list.innerHTML = filtered.map(c => `
    <div class="chat-item${activeContact?.id===c.id?' active':''}" onclick="openChat('${c.id}')">
      ${mkAvatar(c.av, 44, c.status)}
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font-weight:600;font-size:14px">${c.name}</span>
          <span style="font-size:11px;color:#4a4a5e">${c.seen}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:#8b8b9e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:155px">${c.last}</span>
          ${c.unread>0?`<span class="unread-badge">${c.unread}</span>`:''}
        </div>
      </div>
    </div>`).join('')
}

function openChat(id) {
  activeContact = contacts.find(c=>c.id===id)
  messages = seedMsgs(activeContact)
  document.getElementById('empty-state').style.display = 'none'
  const area = document.getElementById('chat-area')
  area.style.display = 'flex'

  document.getElementById('chat-header').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px">
      ${mkAvatar(activeContact.av, 42, activeContact.status)}
      <div>
        <div style="font-weight:700;font-size:15px">${activeContact.name}</div>
        <div style="font-size:12px;color:${activeContact.status==='online'?'#10b981':activeContact.status==='away'?'#f59e0b':'#8b8b9e'}">
          ${activeContact.members ? activeContact.members+' members' : activeContact.status==='online' ? '● Online' : activeContact.status==='away' ? '● Away' : 'Last seen '+activeContact.seen}
        </div>
      </div>
    </div>
    <div style="display:flex;gap:4px">
      <button class="icon-btn" title="Voice call" onclick="startCall('voice')">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </button>
      <button class="icon-btn" title="Video call" onclick="startCall('video')">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      </button>
      <button class="icon-btn" title="Search in chat" onclick="alert('Search in chat coming soon!')">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="icon-btn" title="More options" onclick="alert('More options coming soon!')">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </div>`

  renderMessages()
  renderList()
  document.getElementById('msg-input').focus()
}

function renderMessages() {
  const box = document.getElementById('messages')
  box.innerHTML = messages.map(m => {
    const mine = m.from === 'me'
    return `<div class="msg-row${mine?' mine':''} fade">
      ${!mine ? mkAvatar(activeContact.av, 28, null) : ''}
      <div class="${mine?'msg-mine':'msg-theirs'}">
        ${m.text}
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:2px;margin-top:4px">
          <span style="font-size:11px;color:${mine?'rgba(255,255,255,0.55)':'#4a4a5e'}">${m.time}</span>
          ${mine ? tick(m.status) : ''}
        </div>
      </div>
    </div>`
  }).join('')
  box.scrollTop = box.scrollHeight
}

function sendMessage() {
  const input = document.getElementById('msg-input')
  const text = input.value.trim()
  if(!text || !activeContact) return
  const time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})
  messages.push({from:'me', text, time, status:'sent'})
  input.value = ''
  input.style.height = 'auto'
  updateSendBtn(false)
  renderMessages()
  setTimeout(() => {
    messages[messages.length-1].status = 'delivered'
    renderMessages()
  }, 800)
  setTimeout(() => {
    messages.push({from:activeContact.id, text:'Got it! 👍', time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}), status:'delivered'})
    renderMessages()
  }, 1800)
}

function handleInput(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 100) + 'px'
  updateSendBtn(el.value.trim().length > 0)
}

function updateSendBtn(hasText) {
  const btn = document.getElementById('send-btn')
  btn.innerHTML = hasText
    ? `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`
    : `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`
  btn.title = hasText ? 'Send message' : 'Voice message'
  btn.onclick = hasText ? sendMessage : () => alert('Voice recording coming soon!')
}

function handleKey(e) {
  if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
}

function switchTab(btn, tab) {
  currentTab = tab
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderList()
}

let callType = null
function startCall(type) {
  callType = type
  document.getElementById('modal-av').textContent = activeContact.av
  document.getElementById('modal-name').textContent = activeContact.name
  document.getElementById('modal-sub').textContent = type === 'video' ? '📹 Video calling...' : '📞 Calling...'
  document.getElementById('modal-overlay').classList.add('show')
}

function acceptCall() {
  alert(`${callType === 'video' ? 'Video' : 'Voice'} call accepted! (WebRTC integration coming soon)`)
  document.getElementById('modal-overlay').classList.remove('show')
}

function closeCall(e) {
  if(!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('show')
  }
}

renderList()
</script>
</body>
</html>
